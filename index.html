<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow • Todo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        
        .todo-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .todo-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -5px rgb(0 0 0 / 0.15);
        }
        
        .todo-card p {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .modal {
            animation: modalPop 0.25s ease forwards;
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 640px) {
            .mobile-stack { flex-direction: column; }
            .sidebar-on-top {
                border-right: none;
                border-bottom: 1px solid #27272a;
                width: 100%;
                position: static;
            }
            main { min-height: auto; }
            .todo-card { padding: 1.25rem; }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">

    <div class="flex flex-col sm:flex-row min-h-screen mobile-stack">

        <!-- STICKY SIDEBAR -->
        <aside class="sidebar-on-top w-full sm:w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col shrink-0 sm:sticky sm:top-0 sm:h-screen overflow-y-auto">

            <!-- Logo -->
            <div class="px-6 py-6 border-b border-zinc-800 flex items-center gap-3">
                <div class="w-9 h-9 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-3xl font-bold logo-font">T</div>
                <span class="text-3xl font-semibold tracking-tighter logo-font">TaskFlow</span>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 px-4 py-5 space-y-1.5 sm:py-6">
                <button onclick="switchFilter('all')" id="nav-all"
                        class="nav-item active w-full flex items-center gap-4 px-6 py-3.5 rounded-2xl text-base font-medium hover:bg-zinc-800/80 transition-colors">
                    <span>🏠</span> Dashboard
                    <span id="count-all" class="ml-auto bg-zinc-700 text-xs px-2.5 py-1 rounded-xl font-mono">0</span>
                </button>
                <button onclick="switchFilter('pending')" id="nav-pending"
                        class="nav-item w-full flex items-center gap-4 px-6 py-3.5 rounded-2xl text-base font-medium hover:bg-zinc-800/80 transition-colors">
                    <span>⏳</span> Pending
                    <span id="count-pending" class="ml-auto bg-amber-500/10 text-amber-400 text-xs px-2.5 py-1 rounded-xl font-mono">0</span>
                </button>
                <button onclick="switchFilter('completed')" id="nav-completed"
                        class="nav-item w-full flex items-center gap-4 px-6 py-3.5 rounded-2xl text-base font-medium hover:bg-zinc-800/80 transition-colors">
                    <span>✅</span> Completed
                    <span id="count-completed" class="ml-auto bg-emerald-500/10 text-emerald-400 text-xs px-2.5 py-1 rounded-xl font-mono">0</span>
                </button>
            </nav>

            <!-- Total tasks -->
            <div class="p-5 sm:p-6 border-t border-zinc-800 mt-auto">
                <div class="bg-zinc-950 rounded-2xl p-5 text-center">
                    <div id="total-tasks" class="text-4xl sm:text-5xl font-bold font-mono text-white">0</div>
                    <div class="text-xs uppercase tracking-wider text-zinc-500 mt-1">Total Tasks</div>
                </div>
            </div>
        </aside>

        <!-- MAIN AREA with STICKY NAVBAR -->
        <div class="flex-1 flex flex-col min-w-0">

            <!-- STICKY NAVBAR -->
            <header class="sticky top-0 z-30 h-12 bg-zinc-900 border-b border-zinc-800 px-5 flex items-center justify-between shadow-md">
                <h1 id="view-title" class="text-xl sm:text-2xl font-semibold tracking-tight">Dashboard</h1>
                
                <div class="flex items-center gap-4">
                    <div class="hidden sm:flex items-center gap-2 text-emerald-400 text-sm font-medium">
                        <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                        LIVE
                    </div>
                    <div class="w-8 h-8 bg-zinc-800 rounded-2xl flex items-center justify-center text-xl">👤</div>
                </div>
            </header>

            <!-- SCROLLABLE CONTENT - NO SCROLL HERE -->
                <main class="flex-1 p-4 sm:p-5 md:p-6 flex flex-col min-h-0">

                <!-- Progress -->
                <div class="mb-6">
                    <div class="flex justify-between items-baseline mb-3">
                        <span class="text-sm font-medium text-zinc-400">PROGRESS</span>
                        <span id="progress-text" class="text-3xl sm:text-4xl font-bold font-mono text-emerald-400">0%</span>
                    </div>
                    <div class="h-2 bg-zinc-800 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-gradient-to-r from-emerald-500 to-teal-400 rounded-full w-0 transition-all duration-700"></div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex flex-col sm:flex-row gap-3 mb-6">
                    <div class="flex-1 relative">
                        <input id="search-input" 
                               type="text" 
                               placeholder="Search tasks... (press /)"
                               class="w-full bg-zinc-900 border border-zinc-700 focus:border-emerald-500 rounded-3xl py-4 pl-14 pr-6 text-base outline-none transition-all">
                        <div class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400 text-xl">🔍</div>
                    </div>
                    <button onclick="openAddModal()"
                            class="flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-500 px-6 py-4 rounded-3xl text-white font-medium transition-colors min-w-[140px]">
                        <span class="text-xl">+</span> New Task
                    </button>
                </div>

                <!-- Tasks + Pagination wrapper -->
                <div class="flex-1 flex flex-col min-h-0">

                    <!-- Tasks area (no inner scroll) -->
                    <div id="tasks-container" class="pr-2 sm:pr-4">
                        <div id="todo-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-2 pb-2"></div>
                    </div>

                    <!-- Pagination at bottom -->
                    <div id="pagination" class="flex justify-center items-center gap-2 mt-4 flex-wrap pt-3 border-t border-zinc-800/50">
                        <button onclick="changePage(currentPage - 1)" 
                                class="px-5 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl disabled:opacity-40 disabled:cursor-not-allowed">
                            ← Previous
                        </button>
                        <div id="page-info" class="text-lg font-medium px-4">Page 1 of 1</div>
                        <button onclick="changePage(currentPage + 1)" 
                                class="px-5 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl disabled:opacity-40 disabled:cursor-not-allowed">
                            Next →
                        </button>
                    </div>
                </div>

                <!-- Empty state -->
                <div id="empty-state" class="hidden text-center py-16 flex-1 flex flex-col items-center justify-center">
                    <div class="text-6xl sm:text-7xl mb-6">📭</div>
                    <p class="text-xl sm:text-2xl text-zinc-400">No tasks yet</p>
                    <p class="text-zinc-500 mt-2">Create your first task above</p>
                </div>

            </main>
        </div>
    </div>

    <!-- MODAL -->
    <div id="task-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
        <div class="modal bg-zinc-900 w-full max-w-md rounded-3xl overflow-hidden">
            <div class="px-6 pt-6 pb-4 border-b border-zinc-700 flex justify-between items-center">
                <h2 id="modal-title" class="text-2xl font-semibold">New Task</h2>
                <button onclick="closeModal()" class="text-3xl text-zinc-400 hover:text-white">×</button>
            </div>
                 <div class="p-6 space-y-3">
                  <input id="modal-input" 
                      type="text"
                      class="w-full bg-zinc-800 border border-transparent focus:border-emerald-500 rounded-3xl px-6 py-3 text-lg outline-none"
                      placeholder="What needs to be done?">
                  <input id="modal-date"
                      type="date"
                      class="w-full bg-zinc-800 border border-transparent focus:border-emerald-500 rounded-3xl px-4 py-2 text-sm outline-none"
                      aria-label="Task date">
                 </div>
            <div class="p-6 bg-zinc-950 border-t border-zinc-700 flex gap-4">
                <button onclick="closeModal()" 
                        class="flex-1 py-4 text-base border border-zinc-700 rounded-3xl hover:bg-zinc-800">Cancel</button>
                <button onclick="saveTask()" 
                        class="flex-1 py-4 text-base font-semibold bg-emerald-600 hover:bg-emerald-500 rounded-3xl">Save</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
